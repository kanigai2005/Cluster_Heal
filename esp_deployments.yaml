apiVersion: v1
kind: Namespace
metadata:
  name: town-traffic
---
apiVersion: v1
kind: Namespace
metadata:
  name: campus-water
---
apiVersion: v1
kind: Namespace
metadata:
  name: kitchen-traffic
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esp-traffic-camera
  namespace: town-traffic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esp-traffic-camera
  template:
    metadata:
      labels:
        app: esp-traffic-camera
    spec:
      containers:
      - name: app
        image: busybox
        command: ["sh", "-c"]
        args: ["while true; do echo 'CPU work'; i=0; while [ $i -lt 1000000 ]; do i=$((i+1)); done; sleep 1; done"]
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esp-water-sensor
  namespace: campus-water
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esp-water-sensor
  template:
    metadata:
      labels:
        app: esp-water-sensor
    spec:
      containers:
      - name: app
        image: busybox
        command: ["sh", "-c"]
        args: ["while true; do dd if=/dev/zero of=/tmp/io bs=1M count=10 2>/dev/null; sleep 2; done"]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esp-smart-kitchen
  namespace: kitchen-traffic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esp-smart-kitchen
  template:
    metadata:
      labels:
        app: esp-smart-kitchen
    spec:
      containers:
      - name: app
        image: busybox
        command: ["sh", "-c"]
        args: ["while true; do 'echo memory work'; sleep 1; done"]
        resources:
          requests:
            cpu: "150m"
            memory: "192Mi"
