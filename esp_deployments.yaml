apiVersion: apps/v1
kind: Deployment
metadata:
  name: esp-traffic-camera
  namespace: town-traffic
  labels:
    app: esp-traffic-camera
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esp-traffic-camera
  template:
    metadata:
      labels:
        app: esp-traffic-camera
    spec:
      containers:
        - name: traffic-camera
          image: custom/esp-traffic-camera:v1.3.4
          resources:
            limits:
              cpu: "4"
              memory: "512Mi"
            requests:
              cpu: "1"
              memory: "256Mi"
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esp-water-sensor
  namespace: campus-water
  labels:
    app: esp-water-sensor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esp-water-sensor
  template:
    metadata:
      labels:
        app: esp-water-sensor
    spec:
      containers:
        - name: water-polling
          image: custom/esp-water-sensor:v1.0.1
          resources:
            limits:
              cpu: "2"
              memory: "256Mi"
            requests:
              cpu: "500m"
              memory: "128Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esp-smart-kitchen
  namespace: kitchen-traffic
  labels:
    app: esp-smart-kitchen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esp-smart-kitchen
  template:
    metadata:
      labels:
        app: esp-smart-kitchen
    spec:
      containers:
        - name: kitchen-hub
          image: custom/esp-kitchen-hub:v2.1.0
          resources:
            limits:
              cpu: "2"
              memory: "512Mi"
            requests:
              cpu: "500m"
              memory: "256Mi"
